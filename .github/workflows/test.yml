name: CI Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    services:
      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example
        ports:
          - 27017:27017
        options: >
          --bind_ip_all

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run tests
        env:
          MONGO_URI: mongodb://root:example@mongodb:27017/test-db
          DB_NAME: test-db
          CI: true
        run: |
          npx playwright test tests --project=${{ matrix.browser }} --reporter=allure-playwright
          npx playwright test tests/api --reporter=allure-playwright

      - run: npx allure generate ./allure-results --clean

      - uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ./allure-results
