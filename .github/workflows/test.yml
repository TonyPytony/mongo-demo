name: CI Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    services:
      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo -u root -p example --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run tests
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example
          MONGO_HOST: mongodb
          MONGO_PORT: 27017
          DB_NAME: test-db
          BASE_URL: http://localhost:3000
          CI: true
        run: |
          npx playwright test tests --project=${{ matrix.browser }} --reporter=allure-playwright
          npx playwright test tests/api --reporter=allure-playwright

      - run: npx allure generate ./allure-results --clean

      - uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ./allure-results
